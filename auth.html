<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeLog DZ — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#080a0f;--dark:#0d1117;--card:#111820;--border:#1e2a38;
  --gold:#f0b429;--gold2:#e09a10;--green:#00d97e;--red:#ff4d6a;
  --text:#e8edf5;--muted:#6b7a8d;--input:#151d28;
  --font:'Cairo',sans-serif;--font-en:'Syne',sans-serif;
}
html,body{height:100%;margin:0}
body{background:var(--black);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;min-height:100vh}
.bg{position:fixed;inset:0;background-image:linear-gradient(rgba(240,180,41,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(240,180,41,0.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.bg-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(240,180,41,0.06) 0%,transparent 70%);pointer-events:none}
nav{position:relative;z-index:10;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(240,180,41,0.08);background:var(--dark)}
.logo{font-family:var(--font-en);font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none}
.logo span{color:var(--gold)}
.nav-back{color:var(--muted);font-size:0.85rem;text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--gold)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}
.auth-card{width:100%;max-width:440px}
.auth-tabs{display:flex;background:var(--dark);border:1px solid var(--border);border-radius:12px 12px 0 0;overflow:hidden}
.auth-tab{flex:1;padding:14px;text-align:center;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);background:transparent;border:none;font-family:var(--font)}
.auth-tab.active{background:var(--card);color:var(--gold)}
.auth-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:32px}
.trial-banner{background:rgba(0,217,126,0.08);border:1px solid rgba(0,217,126,0.2);border-radius:8px;padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;font-size:0.85rem;color:var(--green)}
.msg{padding:11px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;display:none;line-height:1.5}
.msg.success{background:rgba(0,217,126,0.1);border:1px solid rgba(0,217,126,0.25);color:var(--green);display:block}
.msg.error{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.25);color:var(--red);display:block}
.msg.info{background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.25);color:var(--gold);display:block}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:7px;font-weight:600}
.form-input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:0.92rem;transition:border-color .2s;outline:none}
.form-input:focus{border-color:rgba(240,180,41,0.4)}
.form-input::placeholder{color:var(--muted)}
.pw-wrap{position:relative}
.pw-wrap .form-input{padding-left:44px}
.pw-toggle{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem}
.check-group{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
.check-group input{width:16px;height:16px;margin-top:2px;accent-color:var(--gold);cursor:pointer}
.check-group label{font-size:0.82rem;color:var(--muted);line-height:1.5;cursor:pointer}
.check-group a{color:var(--gold);text-decoration:none}
.btn-submit{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:13px;font-family:var(--font);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{background:var(--gold2)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:0.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--font);font-size:0.9rem;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:rgba(240,180,41,0.3)}
.forgot-link{font-size:0.8rem;color:var(--muted);text-decoration:none;display:block;text-align:right;margin-top:6px;transition:color .2s}
.forgot-link:hover{color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
.auth-footer{text-align:center;margin-top:20px;font-size:0.78rem;color:var(--muted)}

/* DASHBOARD */
.dashboard{display:none;width:100%;max-width:500px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:16px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dash-title{font-size:1.1rem;font-weight:700}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;font-family:var(--font);font-size:0.82rem;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.trial-status{background:var(--input);border-radius:10px;padding:16px;margin-bottom:16px}
.trial-bar-wrap{background:rgba(255,255,255,0.05);border-radius:4px;height:6px;overflow:hidden;margin-top:8px}
.trial-bar{height:100%;border-radius:4px;transition:width 1s}
.trial-badge{background:rgba(0,217,126,0.12);border:1px solid rgba(0,217,126,0.25);color:var(--green);font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:100px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.dash-stat{background:var(--input);border-radius:8px;padding:14px;text-align:center}
.dash-stat-val{font-family:var(--font-en);font-size:1.5rem;font-weight:800;color:var(--gold)}
.dash-stat-label{font-size:0.75rem;color:var(--muted);margin-top:4px}
.btn-dashboard{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:13px;font-family:var(--font);font-size:0.95rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-dashboard:hover{background:var(--gold2)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-glow"></div>

<nav>
  <a href="trading-landing.html" class="logo">Trade<span>Log</span> DZ</a>
  <a href="trading-landing.html" class="nav-back">← رجوع للرئيسية</a>
</nav>

<main>
  <!-- AUTH CARD -->
  <div class="auth-card" id="auth-section">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">حساب جديد</button>
    </div>
    <div class="auth-body">

      <!-- LOGIN -->
      <div id="login-form">
        <div class="msg" id="login-msg"></div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="login-email" placeholder="trader@example.com" dir="ltr">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="pw-wrap">
            <input type="password" class="form-input" id="login-password" placeholder="••••••••" dir="ltr">
            <button class="pw-toggle" type="button" onclick="togglePw('login-password',this)">👁</button>
          </div>
          <a href="#" class="forgot-link" onclick="switchTab('forgot');return false">نسيت كلمة المرور؟</a>
        </div>
        <button class="btn-submit" id="login-btn" onclick="doLogin()">دخول</button>
        <div class="divider">أو</div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          المتابعة مع Google
        </button>
      </div>

      <!-- REGISTER -->
      <div id="register-form" style="display:none">
        <div class="trial-banner">🎁 <span>ستحصل على <strong>7 أيام مجانية</strong> — بدون بطاقة بنكية</span></div>
        <div class="msg" id="register-msg"></div>
        <div class="form-group">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" class="form-input" id="reg-name" placeholder="Ahmed Benali">
        </div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="reg-email" placeholder="trader@example.com" dir="ltr">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="pw-wrap">
            <input type="password" class="form-input" id="reg-password" placeholder="••••••••" dir="ltr">
            <button class="pw-toggle" type="button" onclick="togglePw('reg-password',this)">👁</button>
          </div>
        </div>
        <div class="check-group">
          <input type="checkbox" id="terms-check">
          <label for="terms-check">أوافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a></label>
        </div>
        <button class="btn-submit" id="register-btn" onclick="doRegister()">إنشاء الحساب — ابدأ 7 أيام مجاناً</button>
        <div class="divider">أو</div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          التسجيل مع Google
        </button>
      </div>

      <!-- FORGOT -->
      <div id="forgot-form" style="display:none">
        <div class="msg" id="forgot-msg"></div>
        <p style="font-size:0.88rem;color:var(--muted);margin-bottom:20px;line-height:1.7">أدخل بريدك وسنرسل لك رابط إعادة التعيين.</p>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="forgot-email" placeholder="trader@example.com" dir="ltr">
        </div>
        <button class="btn-submit" id="forgot-btn" onclick="doForgot()">إرسال رابط الاسترداد</button>
        <div style="margin-top:14px;text-align:center">
          <a href="#" onclick="switchTab('login');return false" style="font-size:0.82rem;color:var(--muted);text-decoration:none">← رجوع لتسجيل الدخول</a>
        </div>
      </div>

    </div>
    <div class="auth-footer">TradeLog DZ — منصة التداول الاحترافية للجزائريين 🇩🇿</div>
  </div>

  <!-- DASHBOARD PREVIEW -->
  <div class="dashboard" id="dashboard-section">
    <div class="dash-card">
      <div class="dash-header">
        <div>
          <div class="dash-title" id="dash-welcome">مرحباً! 👋</div>
          <div style="font-size:0.82rem;color:var(--muted);margin-top:4px" id="dash-email"></div>
        </div>
        <button class="btn-logout" onclick="doLogout()">تسجيل الخروج</button>
      </div>
      <div class="trial-status">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:0.85rem;font-weight:600">التجربة المجانية</span>
          <span class="trial-badge" id="trial-badge">7 أيام</span>
        </div>
        <div class="trial-bar-wrap">
          <div class="trial-bar" id="trial-bar" style="width:100%;background:var(--green)"></div>
        </div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:8px" id="trial-text"></div>
      </div>
      <div class="dash-stats">
        <div class="dash-stat"><div class="dash-stat-val">0</div><div class="dash-stat-label">صفقة</div></div>
        <div class="dash-stat"><div class="dash-stat-val">—</div><div class="dash-stat-label">Win Rate</div></div>
        <div class="dash-stat"><div class="dash-stat-val">$0</div><div class="dash-stat-label">P&L</div></div>
      </div>
      <button class="btn-dashboard" onclick="location.href='dashboard.html'">→ افتح Dashboard</button>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════
//  SUPABASE CONFIG
// ══════════════════════════════════════
const SUPA_URL = 'https://auqldnclhwyolwhtssph.supabase.co';
const SUPA_KEY = 'sb_publishable_D5svtHjv7cXJpPCEurB_8A_e3WNRsJy';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if(session) showDashboard(session.user);

  sb.auth.onAuthStateChange((event, session) => {
    if(session) showDashboard(session.user);
    else showAuth();
  });
});

// ══════════════════════════════════════
//  TAB SWITCH
// ══════════════════════════════════════
function switchTab(tab) {
  document.getElementById('login-form').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('forgot-form').style.display   = tab==='forgot'   ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}

// ══════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if(!email || !password) return showMsg('login-msg','error','أدخل البريد وكلمة المرور');
  setLoading('login-btn', true, 'دخول');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('login-btn', false, 'دخول');
  if(error) return showMsg('login-msg','error','البريد أو كلمة المرور غلط');
  showMsg('login-msg','success','✓ مرحباً! جاري التحويل...');
  setTimeout(()=> location.href='dashboard.html', 800);
}

// ══════════════════════════════════════
//  REGISTER
// ══════════════════════════════════════
async function doRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const terms    = document.getElementById('terms-check').checked;
  if(!name)              return showMsg('register-msg','error','أدخل اسمك الكامل');
  if(!email || !email.includes('@')) return showMsg('register-msg','error','أدخل بريد إلكتروني صحيح');
  if(password.length < 6) return showMsg('register-msg','error','كلمة المرور يجب 6 أحرف على الأقل');
  if(!terms)             return showMsg('register-msg','error','يجب الموافقة على شروط الاستخدام');
  setLoading('register-btn', true, 'إنشاء الحساب');
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  setLoading('register-btn', false, 'إنشاء الحساب — ابدأ 7 أيام مجاناً');
  if(error) return showMsg('register-msg','error', error.message);
  showMsg('register-msg','success','✓ تم إنشاء حسابك! جاري التحويل...');
  setTimeout(()=> location.href='dashboard.html', 1000);
}

// ══════════════════════════════════════
//  GOOGLE
// ══════════════════════════════════════
async function doGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if(error) showMsg('login-msg','error', error.message);
}

// ══════════════════════════════════════
//  FORGOT PASSWORD
// ══════════════════════════════════════
async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if(!email) return showMsg('forgot-msg','error','أدخل بريدك الإلكتروني');
  setLoading('forgot-btn', true, 'إرسال');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html'
  });
  setLoading('forgot-btn', false, 'إرسال رابط الاسترداد');
  if(error) return showMsg('forgot-msg','error', error.message);
  showMsg('forgot-msg','success','✓ تم إرسال الرابط لبريدك!');
}

// ══════════════════════════════════════
//  LOGOUT
// ══════════════════════════════════════
async function doLogout() {
  await sb.auth.signOut();
  showAuth();
}

// ══════════════════════════════════════
//  SHOW DASHBOARD
// ══════════════════════════════════════
function showDashboard(user) {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard-section').style.display = 'block';
  const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Trader';
  document.getElementById('dash-welcome').textContent = 'مرحباً، ' + name + ' 👋';
  document.getElementById('dash-email').textContent = user.email;
  const created  = new Date(user.created_at || Date.now());
  const trialEnd = new Date(created.getTime() + 7*24*60*60*1000);
  const daysLeft = Math.max(0, Math.ceil((trialEnd - new Date()) / (1000*60*60*24)));
  const pct = Math.round((daysLeft/7)*100);
  document.getElementById('trial-badge').textContent = daysLeft + ' أيام متبقية';
  document.getElementById('trial-bar').style.width = pct + '%';
  document.getElementById('trial-bar').style.background = daysLeft<=2?'var(--red)':daysLeft<=4?'var(--gold)':'var(--green)';
  document.getElementById('trial-text').textContent = 'تنتهي في: ' + trialEnd.toLocaleDateString('ar-DZ');
}

function showAuth() {
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('dashboard-section').style.display = 'none';
}

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  if(!el) return;
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  if(!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<div class="spinner"></div>' : label;
}

function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// Enter key
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  if(document.getElementById('login-form').style.display !== 'none') doLogin();
  else if(document.getElementById('register-form').style.display !== 'none') doRegister();
  else if(document.getElementById('forgot-form').style.display !== 'none') doForgot();
});
</script>
